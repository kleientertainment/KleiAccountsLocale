          def po_quote(value: str) -> str:
              return '"' + value.replace('\\', '\\\\').replace('"', '\\"').replace('\n', '\\n') + '"'

          path = Path('tr/strings.po')
          text = path.read_text(encoding='utf-8')
          lines = text.splitlines()
          out = []
          current_key = None
          filled = []
          missing = []

          for line in lines:
              if line.startswith('#. i18n: keyword: '):
                  current_key = line[len('#. i18n: keyword: '):]
              if line == 'msgstr ""' and current_key:
                  if current_key in translations:
                      out.append('msgstr ' + po_quote(translations[current_key]))
                      filled.append(current_key)
                      continue
                  missing.append(current_key)
              out.append(line)

          new_text = '\n'.join(out)
          if text.endswith('\n'):
              new_text += '\n'

          revision_date = datetime.utcnow().strftime('%Y-%m-%d %H:%M+0000')
          new_text = re.sub(
              r'"PO-Revision-Date: [^"\\]*(?:\\.[^"\\]*)*\\n"',
              f'"PO-Revision-Date: {revision_date}\\n"',
              new_text,
              count=1,
          )

          # Re-scan to make sure no non-header empty msgstr is left behind.
          current_key = None
          remaining = []
          for line in new_text.splitlines():
              if line.startswith('#. i18n: keyword: '):
                  current_key = line[len('#. i18n: keyword: '):]
              elif line == 'msgstr ""' and current_key:
                  remaining.append(current_key)

          if remaining:
              print('Untranslated keys remain:')
              for key in remaining:
                  print('-', key)
              sys.exit(1)

          path.write_text(new_text, encoding='utf-8')

          workflow_path = Path('.github/workflows/fix-turkish-locale.yml')
          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
          subprocess.run(['git', 'add', 'tr/strings.po'], check=True)
          if workflow_path.exists():
              subprocess.run(['git', 'rm', str(workflow_path)], check=True)
          subprocess.run(['git', 'diff', '--cached', '--check'], check=True)
          subprocess.run(['git', 'commit', '-m', 'Complete Turkish locale translations'], check=True)
          subprocess.run(['git', 'push'], check=True)
          print(f'Filled {len(filled)} Turkish translations.')
          PY
